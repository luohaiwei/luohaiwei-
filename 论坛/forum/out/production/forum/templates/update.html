<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改个人信息</title>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2980b9;
            --accent-color: #e74c3c;
            --light-color: #ecf0f1;
            --dark-color: #2c3e50;
            --success-color: #2ecc71;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .profile-container {
            background-color: white;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-header h1 {
            color: var(--dark-color);
            margin-bottom: 10px;
        }

        .update-message {
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }

        .update-success {
            background-color: #d4edda;
            color: #155724;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark-color);
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .form-control[readonly] {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: var(--secondary-color);
        }

        .btn-back {
            background-color: #6c757d;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-back:hover {
            background-color: #5a6268;
        }
    </style>
    <script>
        function validateForm() {
            var userName = document.forms["updateForm"]["userName"].value;
            var userPassword = document.forms["updateForm"]["userPassword"].value;

            if (userName === "") {
                alert("用户名不能为空");
                return false;
            }
            if (userPassword.length < 7) {
                alert("密码不能小于七位数");
                return false;
            }
            return true;
        }
    </script>
</head>
<body>
<div class="profile-container">
    <div class="profile-header">
        <h1>修改个人信息</h1>
        <p>更新您的账户信息</p>
    </div>

    <!-- 更新消息 -->
    <div th:if="${updateMessage}" class="update-message update-success" th:text="${updateMessage}"></div>

    <form name="updateForm" action="/users/updateServer" method="post" onsubmit="return validateForm()">
        <div class="form-group">
            <label for="userName">用户名</label>
            <input type="text" id="userName" name="userName" class="form-control" th:value="${session.users.userName}">
        </div>

        <div class="form-group">
            <label for="userEmail">邮箱</label>
            <input type="text" id="userEmail" name="userEmail" class="form-control" th:value="${session.users.userEmail}" readonly>
        </div>

        <div class="form-group">
            <label for="userPassword">密码</label>
            <input type="password" id="userPassword" name="userPassword" class="form-control" th:value="${session.users.userPassword}">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">保存修改</button>
            <a href="javascript:history.back()" class="btn btn-back">返回</a>
        </div>
    </form>
</div>
</body>
</html>
