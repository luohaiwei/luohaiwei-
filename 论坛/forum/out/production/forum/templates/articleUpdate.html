<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改文章</title>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2980b9;
            --accent-color: #e74c3c;
            --light-color: #ecf0f1;
            --dark-color: #2c3e50;
            --success-color: #2ecc71;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .update-container {
            background-color: white;
            width: 100%;
            max-width: 800px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .update-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .update-header h1 {
            color: var(--dark-color);
            margin-bottom: 10px;
        }

        .error-message {
            color: var(--danger-color);
            margin-bottom: 20px;
            padding: 10px;
            background-color: #f8d7da;
            border-radius: 4px;
            font-size: 14px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark-color);
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .textarea-control {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            line-height: 1.6;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none;
        }

        .btn:hover {
            background-color: var(--secondary-color);
        }

        .btn-secondary {
            background-color: #6c757d;
        }

        .btn-secondary:hover {
            background-color: #5a6268;
        }
    </style>
    <script>
        function validateForm() {
            var articleTitle = document.forms["articleUpdateForm"]["articleTitle"].value;
            var articleContent = document.forms["articleUpdateForm"]["articleContent"].value;

            if (articleTitle.trim() === "") {
                alert("文章标题不能为空");
                return false;
            }
            if (articleContent.trim() === "") {
                alert("文章内容不能为空");
                return false;
            }
            return true;
        }
    </script>
</head>
<body>
<div class="update-container">
    <div class="update-header">
        <h1>修改文章</h1>
        <p>更新你的文章内容</p>
    </div>

    <!-- 错误提示 -->
    <div th:if="${updateMessage}" class="error-message" th:text="${updateMessage}"></div>

    <form name="articleUpdateForm" action="/article/update" method="post" onsubmit="return validateForm()">
        <div class="form-group">
            <label for="articleTitle">标题</label>
            <input type="text" id="articleTitle" name="articleTitle" class="form-control" th:value="${article.articleTitle}">
        </div>

        <div class="form-group">
            <label for="articleContent">内容</label>
            <textarea id="articleContent" name="articleContent" class="textarea-control" th:text="${article.articleContent}"></textarea>
        </div>

        <input type="hidden" name="articleId" th:value="${article.articleId}">

        <div class="form-actions">
            <button type="submit" class="btn">保存修改</button>
            <a th:href="@{/article/show/{aId}(aId=${article.articleId})}" class="btn btn-secondary">返回文章详情</a>
        </div>
    </form>
</div>
</body>
</html>
